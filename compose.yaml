services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-real_estate_investing}
      POSTGRES_USER: ${DB_USER:-real_estate_investing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-real_estate_investing_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DJANGO_SETTINGS_MODULE: real_estate_investing.settings
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-unsafe-compose-development-secret-key-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:${NGINX_PORT:-8080},http://127.0.0.1:${NGINX_PORT:-8080}}
      DB_NAME: ${DB_NAME:-real_estate_investing}
      DB_USER: ${DB_USER:-real_estate_investing}
      DB_PASSWORD: ${DB_PASSWORD:-real_estate_investing_password}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - staticfiles:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/app/staticfiles:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  staticfiles:
