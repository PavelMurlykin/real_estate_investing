<header>
  <nav class="navbar shadow-sm">
    <div class="container">
      {% with request.resolver_match.view_name as view_name %}
        <ul class="nav nav-pills">
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'homepage:index' %} active {% endif %}"
              href="{% url 'homepage:index' %}">
              Главная
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'property:list' %} active {% endif %}"
              href="{% url 'property:list' %}">
              Объекты недвижимости
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'mortgage:mortgage_calculator' %} active {% endif %}"
              href="{% url 'mortgage:mortgage_calculator' %}">
              Ипотечный калькулятор
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'trench_mortgage:trench_mortgage_calculator' %} active {% endif %}"
              href="{% url 'trench_mortgage:trench_mortgage_calculator' %}">
              Траншевая ипотека
            </a>
          </li>
        </ul>
      {% endwith %}
    </div>
  </nav>
</header>
