<header>
  <nav class="navbar shadow-sm">
    <div class="container d-flex flex-wrap align-items-center justify-content-between gap-3">
      {% with request.resolver_match.view_name as view_name %}
        <ul class="nav nav-pills">
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'homepage:index' %} active {% endif %}"
              href="{% url 'homepage:index' %}">
              Главная
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'property:location_catalog' %} active {% endif %}"
              href="{% url 'property:location_catalog' %}">
              Локации
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'bank:catalog' %} active {% endif %}"
              href="{% url 'bank:catalog' %}">
              Банки
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'property:dictionary_catalog' %} active {% endif %}"
              href="{% url 'property:dictionary_catalog' %}">
              Справочники
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'property:developer_list' or view_name == 'property:developer_create' or view_name == 'property:developer_update' or view_name == 'property:developer_delete' %} active {% endif %}"
              href="{% url 'property:developer_list' %}">
              Застройщики
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'property:complex_list' or view_name == 'property:complex_create' or view_name == 'property:complex_update' or view_name == 'property:complex_delete' %} active {% endif %}"
              href="{% url 'property:complex_list' %}">
              ЖК
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'property:list' or view_name == 'property:create' or view_name == 'property:detail' or view_name == 'property:update' or view_name == 'property:delete' %} active {% endif %}"
              href="{% url 'property:list' %}">
              Объекты недвижимости
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'mortgage:mortgage_calculator' %} active {% endif %}"
              href="{% url 'mortgage:mortgage_calculator' %}">
              Ипотечный калькулятор
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if view_name == 'trench_mortgage:trench_mortgage_calculator' %} active {% endif %}"
              href="{% url 'trench_mortgage:trench_mortgage_calculator' %}">
              Траншевая ипотека
            </a>
          </li>
        </ul>
      {% endwith %}

      <div class="d-flex align-items-center gap-2">
        <label class="form-label mb-0 small" for="theme-selector">Тема</label>
        <select id="theme-selector" class="form-select form-select-sm" data-theme-selector style="width: auto;">
          <option value="system">Системная</option>
          <option value="light">Светлая</option>
          <option value="dark">Темная</option>
        </select>
      </div>
    </div>
  </nav>
</header>
