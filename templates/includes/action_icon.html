{% load static %}
{% with icon_path='img/'|add:icon|add:'.png' %}
{% if action_icon_is_button %}
<button
    type="{{ button_type|default:'submit' }}"
    class="btn {{ size_class|default:'btn-sm' }} {{ variant_class|default:'btn-outline-primary' }} action-icon-button"
    {% if button_name %}name="{{ button_name }}"{% endif %}
    {% if button_value %}value="{{ button_value }}"{% endif %}
    {% if button_form %}form="{{ button_form }}"{% endif %}
    title="{{ label }}"
    aria-label="{{ label }}"
    data-bs-toggle="tooltip"
    data-bs-title="{{ label }}"
>
    <img src="{% static icon_path %}" alt="" class="action-icon-image" aria-hidden="true">
</button>
{% else %}
<a
    href="{{ href }}"
    class="btn {{ size_class|default:'btn-sm' }} {{ variant_class|default:'btn-outline-primary' }} action-icon-button"
    title="{{ label }}"
    aria-label="{{ label }}"
    data-bs-toggle="tooltip"
    data-bs-title="{{ label }}"
>
    <img src="{% static icon_path %}" alt="" class="action-icon-image" aria-hidden="true">
</a>
{% endif %}
{% endwith %}
