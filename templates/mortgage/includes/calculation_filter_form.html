<form method="get" class="row g-3 align-items-end mb-4" data-catalog-filter-form data-catalog-results-target="{{ calculation_filter_results_target }}">
    {% if target_customer %}
        <input type="hidden" name="customer" value="{{ target_customer.pk }}">
    {% endif %}
    <input type="hidden" name="sort" value="{{ calculation_sort }}">
    <input type="hidden" name="order" value="{{ calculation_order }}">

    <div class="col-lg-3 col-md-6">
        <label for="{{ calculation_filter_id_prefix }}_city" class="form-label">Город</label>
        <select
            id="{{ calculation_filter_id_prefix }}_city"
            name="city"
            class="form-select"
            data-catalog-filter-control
        >
            <option value="">Все города</option>
            {% for city in calculation_cities %}
                <option value="{{ city.id }}" {% if calculation_filters.city == city.id %}selected{% endif %}>
                    {{ city.name }}
                </option>
            {% endfor %}
        </select>
    </div>
    <div class="col-lg-3 col-md-6">
        <label for="{{ calculation_filter_id_prefix }}_q" class="form-label">Объект</label>
        <input
            type="search"
            id="{{ calculation_filter_id_prefix }}_q"
            name="q"
            value="{{ calculation_filters.q }}"
            class="form-control"
            placeholder="ЖК или квартира"
            data-catalog-filter-control
        >
    </div>
    <div class="col-lg-3 col-md-6">
        <label class="form-label">Стоимость объекта</label>
        <div class="input-group">
            <input type="number" name="cost_from" value="{{ calculation_filters.cost_from }}" class="form-control" min="0" step="0.01" placeholder="от" data-catalog-filter-control>
            <input type="number" name="cost_to" value="{{ calculation_filters.cost_to }}" class="form-control" min="0" step="0.01" placeholder="до" data-catalog-filter-control>
        </div>
    </div>
    <div class="col-lg-3 col-md-6">
        <label class="form-label">Первоначальный взнос</label>
        <div class="input-group">
            <input type="number" name="initial_payment_from" value="{{ calculation_filters.initial_payment_from }}" class="form-control" min="0" step="0.01" placeholder="от" data-catalog-filter-control>
            <input type="number" name="initial_payment_to" value="{{ calculation_filters.initial_payment_to }}" class="form-control" min="0" step="0.01" placeholder="до" data-catalog-filter-control>
        </div>
    </div>
    <div class="col-lg-3 col-md-6">
        <label class="form-label">Ежемесячный платеж</label>
        <div class="input-group">
            <input type="number" name="monthly_payment_from" value="{{ calculation_filters.monthly_payment_from }}" class="form-control" min="0" step="0.01" placeholder="от" data-catalog-filter-control>
            <input type="number" name="monthly_payment_to" value="{{ calculation_filters.monthly_payment_to }}" class="form-control" min="0" step="0.01" placeholder="до" data-catalog-filter-control>
        </div>
    </div>
    <div class="col-lg-3 col-md-6">
        <label class="form-label">Срок, лет</label>
        <div class="input-group">
            <input type="number" name="term_from" value="{{ calculation_filters.term_from }}" class="form-control" min="0" step="1" placeholder="от" data-catalog-filter-control>
            <input type="number" name="term_to" value="{{ calculation_filters.term_to }}" class="form-control" min="0" step="1" placeholder="до" data-catalog-filter-control>
        </div>
    </div>
    <div class="col-lg-3 col-md-6">
        <label class="form-label">Ставка, %</label>
        <div class="input-group">
            <input type="number" name="rate_from" value="{{ calculation_filters.rate_from }}" class="form-control" min="0" step="0.01" placeholder="от" data-catalog-filter-control>
            <input type="number" name="rate_to" value="{{ calculation_filters.rate_to }}" class="form-control" min="0" step="0.01" placeholder="до" data-catalog-filter-control>
        </div>
    </div>
    <div class="col-12">
        <a href="{{ calculation_filter_reset_url }}" class="btn btn-outline-secondary">Сбросить</a>
    </div>
</form>
