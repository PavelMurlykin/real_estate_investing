{% extends "base.html" %}

{% block title %}Удаление группы компаний{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <h1 class="card-title">Удаление группы компаний</h1>
            <p>Вы уверены, что хотите удалить группу компаний "{{ object.name }}"?</p>

            {% if protected_error %}
                <div class="alert alert-danger">{{ protected_error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-danger">Удалить</button>
                    <a href="{% url 'property:company_group_list' %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
